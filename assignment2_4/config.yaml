stable_diffusion_loader:
  model_id: "stable-diffusion-v1-5/stable-diffusion-v1-5"
  num_steps: 50
  quantization: "fp16"
  guidance_scale: 7.5

  # UNet Architecture Hyperparameters (from unet_config.json)
  unet_config:
    in_channels: 4
    out_channels: 4
    sample_size: 64
    cross_attention_dim: 768
    attention_head_dim: 8
    block_out_channels: [320, 640, 1280, 1280]
    layers_per_block: 2
    norm_num_groups: 32
    norm_eps: 1e-05

  # VAE Architecture Hyperparameters (from vae_config.json)
  vae_config:
    in_channels: 3
    out_channels: 3
    latent_channels: 4
    block_out_channels: [128, 256, 512, 512]
    scaling_factor: 0.18215

  # CLIP Text Encoder Architecture Hyperparameters (from text_encoder_config.json)
  clip_config:
    vocab_size: 49408
    hidden_size: 768
    max_position_embeddings: 77
    num_hidden_layers: 12
    num_attention_heads: 12
    intermediate_size: 3072

  # Scheduler Algorithm Hyperparameters (from scheduler_config.json)
  scheduler_config:
    beta_start: 0.00085
    beta_end: 0.012
    beta_schedule: "scaled_linear"
    num_train_timesteps: 1000
    set_alpha_to_one: false
    skip_prk_steps: true
    steps_offset: 1
    clip_sample: false